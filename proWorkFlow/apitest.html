<!DOCTYPE html>
<html lang="en">
 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProWorkflow API Authentication Test</title>
 
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }
 
        body {
            background: #f5f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
 
        .container {
            width: 650px;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, .15);
        }
 
        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }
 
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
 
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 15px;
        }
 
        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: #0d6efd;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
 
        button:hover {
            background: #0b5ed7;
        }
 
        #result {
            margin-top: 20px;
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 15px;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 450px;
            overflow: auto;
        }
    </style>
 
</head>
 
<body>
 
    <div class="container">
 
        <h2>ProWorkflow API Test</h2>
 
        <label>API Key</label>
 
        <input id="apikey" type="text" value="EIOM-ZTAY-VAD8-D2Y4-PWFO9JJ-AS11627" />
 
        <button onclick="verifyApi()">
            Verify API Key
        </button>
 
        <div id="result">
            Click "Verify API Key"
        </div>
 
    </div>
 
    <script>
 
        async function verifyApi() {
 
            const apiKey = document.getElementById("apikey").value.trim();
            const result = document.getElementById("result");
 
            result.innerHTML = "Checking authentication...";
 
            try {
 
                const response = await fetch(
                    "https://api.proworkflow.com/api/v4/contacts?pagesize=1&pagenumber=1",
                    {
                        method: "GET",
                        headers: {
                            "apikey": apiKey,
                            "Accept": "application/json"
                        }
                    }
                );
 
                const text = await response.text();
 
                let json;
 
                try {
                    json = JSON.parse(text);
                }
                catch {
                    json = text;
                }
 
                if (response.ok) {
 
                    result.innerHTML =
                        `✅ HTTP Status : ${response.status}
 
Authentication Successful
 
Response:
 
${typeof json === "string" ? json : JSON.stringify(json, null, 4)}`;
 
                }
                else {
 
                    result.innerHTML =
                        `❌ HTTP Status : ${response.status}
 
Authentication Failed
 
Response:
 
${typeof json === "string" ? json : JSON.stringify(json, null, 4)}`;
 
                }
 
            }
            catch (ex) {
 
                result.innerHTML =
                    `Request Failed
 
${ex.message}
 
If you see a CORS error in the browser console (F12 → Console), then the API does not allow direct browser requests. In that case, you'll need to call the API from a backend such as Node.js, .NET, or PHP.`;
 
            }
 
        }
 
    </script>
 
</body>
 
</html>
